{{ define "main" }}
<div class="list-header">
  <h1>{{ .Title }} <span class="list-count">{{ len .Pages }}</span></h1>
  {{ with .Description }}<p class="section-desc">{{ . }}</p>{{ end }}
  <a href="{{ "/" | relURL }}" class="back-link">&larr; 전체 글 보기</a>
</div>

<ul class="post-list">
{{ $paginator := .Paginate .Pages }}
{{ range $paginator.Pages }}
  <li>
    <span class="date">{{ .Date.Format "2006-01-02" }}</span>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
{{ end }}
</ul>

{{ partial "pagination.html" $paginator }}
{{ end }}
