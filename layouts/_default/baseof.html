<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
  <header>
    <nav aria-label="메인 메뉴">
      <div class="nav-left">
        <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Title }}</a>
        <span class="site-desc">{{ .Site.Params.description }}</span>
      </div>
      {{ partial "search.html" . }}
    </nav>
  </header>
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  <footer role="contentinfo">
    <p>&copy; {{ now.Year }} {{ .Site.Title }} · <a href="https://github.com/junghwan16" target="_blank" rel="noopener">GitHub</a></p>
  </footer>
</body>
</html>
