{{ define "main" }}
<hgroup class="page-head">
<h1>{{ .Title }}</h1>
<p>{{ len .Data.Terms }}개의 주제</p>
</hgroup>
<ul class="topic-chips topic-chips--page">
{{ range .Data.Terms.ByCount }}
<li><a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} <small>{{ .Count }}</small></a></li>
{{ end }}
</ul>
{{ end }}
