<div class="search-wrapper">
  <button class="search-toggle" id="search-toggle" type="button" aria-label="검색 열기">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  <input
    type="text"
    id="search-input"
    placeholder="검색..."
    autocomplete="off"
    aria-label="블로그 검색"
  >
  <kbd class="search-shortcut">/</kbd>
  <button class="search-clear" id="search-clear" type="button" aria-label="검색어 지우기">&times;</button>
  <div id="search-results" class="search-results" hidden></div>
</div>

<script>
(function() {
  let pagefind;
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const shortcut = document.querySelector('.search-shortcut');
  const clearBtn = document.getElementById('search-clear');
  const toggle = document.getElementById('search-toggle');
  let debounceTimer;
  const isMobile = function() { return window.innerWidth <= 600; };

  function updateClear() {
    if (!isMobile()) {
      clearBtn.style.display = input.value ? 'block' : 'none';
      shortcut.hidden = input.value || document.activeElement === input;
    }
  }

  function closeSearch() {
    input.value = '';
    input.classList.remove('active');
    results.hidden = true;
    removeOverlay();
    updateClear();
  }

  function removeOverlay() {
    var overlay = document.querySelector('.search-overlay');
    if (overlay) overlay.remove();
  }

  function addOverlay() {
    if (!document.querySelector('.search-overlay')) {
      var overlay = document.createElement('div');
      overlay.className = 'search-overlay';
      overlay.addEventListener('click', closeSearch);
      document.body.appendChild(overlay);
    }
  }

  // Mobile: toggle button opens search
  toggle.addEventListener('click', function() {
    input.classList.add('active');
    addOverlay();
    input.focus();
    initPagefind();
  });

  clearBtn.addEventListener('click', function() {
    if (isMobile()) {
      closeSearch();
    } else {
      input.value = '';
      results.hidden = true;
      updateClear();
      input.focus();
    }
  });

  // Keyboard shortcut: "/" to focus search
  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && document.activeElement !== input) {
      e.preventDefault();
      if (isMobile()) {
        input.classList.add('active');
        addOverlay();
      }
      input.focus();
      initPagefind();
    }
    if (e.key === 'Escape') {
      closeSearch();
      input.blur();
    }
  });

  async function initPagefind() {
    if (!pagefind) {
      try {
        pagefind = await import('/pagefind/pagefind.js');
        await pagefind.init();
      } catch (e) { return; }
    }
  }

  input.addEventListener('focus', function() {
    shortcut.hidden = true;
    initPagefind();
  });

  input.addEventListener('blur', function() {
    if (!input.value && !isMobile()) shortcut.hidden = false;
    setTimeout(function() {
      if (document.activeElement !== input && !isMobile()) {
        results.hidden = true;
      }
    }, 200);
  });

  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    updateClear();
    var query = input.value.trim();

    if (!query) {
      results.hidden = true;
      return;
    }

    debounceTimer = setTimeout(async function() {
      if (!pagefind) return;
      var search = await pagefind.search(query);
      var items = await Promise.all(
        search.results.slice(0, 6).map(function(r) { return r.data(); })
      );

      if (items.length === 0) {
        results.innerHTML = '<div class="search-empty">검색 결과가 없습니다</div>';
        results.hidden = false;
        return;
      }

      results.innerHTML = items.map(function(item) {
        return '<a class="search-item" href="' + item.url + '">' +
          '<span class="search-item-title">' + item.meta.title + '</span>' +
          '<span class="search-item-excerpt">' + (item.excerpt || '') + '</span>' +
        '</a>';
      }).join('');
      results.hidden = false;
    }, 150);
  });

  // Close results when clicking outside (desktop)
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrapper') && !isMobile()) {
      results.hidden = true;
    }
  });
})();
</script>
